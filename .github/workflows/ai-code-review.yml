- name: Generate Git Diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > diff.txt
          if [ -s diff.txt ]; then
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          else
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Send Diff to AI Reviewer
        if: env.HAS_CHANGES == 'true'
        run: |
          python <<EOF
          import json
          import requests

          with open("diff.txt", "r") as f:
              diff = f.read()

          payload = {
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "diff": diff
          }

          response = requests.post(
              "https://ai-code-review-n1dt.onrender.com/review",
              json=payload,
              timeout=120
          )

          response.raise_for_status()

          review = response.json()

          print(json.dumps(review, indent=2))

          with open("review.json", "w") as f:
              json.dump(review, f, indent=4)

          print("Review generated.")
          print("Status:", review["status"])
          EOF

      - name: Skip Review (No Changes)
        if: env.HAS_CHANGES == 'false'
        run: |
          echo '{"status": "PASS", "summary": {"critical":0,"high":0,"medium":0,"low":0,"security_score":100}, "recommendations": [], "ai_review": "No changes to review."}' > review.json
          echo "No diff vs main — skipping AI review."